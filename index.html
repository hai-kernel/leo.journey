<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEO - Backend Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #eff6ff; /* Bluish background */
        color: #000;
      }
      
      .font-handwriting {
        font-family: 'Caveat', cursive;
      }

      /* Text Outline Utility */
      .text-stroke-black {
        -webkit-text-stroke: 2px black;
        color: white;
      }
      
      .text-stroke-blue {
        -webkit-text-stroke: 1.5px black;
        color: #3b82f6;
      }

      /* Animations */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      @keyframes wiggle {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
      }

      .animate-scroll {
        animation: scroll 20s linear infinite;
      }
      .animate-scroll:hover {
        animation-play-state: paused;
      }

      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      
      .animate-float-delayed {
        animation: float 4s ease-in-out 2s infinite; /* Starts later */
      }

      .group:hover .animate-wiggle {
        animation: wiggle 0.5s ease-in-out infinite;
      }

      html { scroll-behavior: smooth; }

      @media print {
        @page { margin: 0; size: auto; }
        body { background: white; }
        .web-view { display: none !important; }
        .print-view { display: block !important; }
        .print-container {
          box-shadow: none !important;
          border: none !important;
          margin: 0 !important;
          width: 100% !important;
          max-width: none !important;
          padding: 20px 40px !important;
        }
      }

      @media screen {
        .print-view { display: none; }
      }
    </style>
